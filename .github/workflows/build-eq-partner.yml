name: Build EQ Partner Windows Installer

on:
  workflow_dispatch:
    inputs:
      commit_branch:
        description: 'Branch to commit the built installer back to'
        required: false
        default: 'main'
  push:
    tags:
      - 'eq-partner-v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Resolve target branch
        id: branch
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.commit_branch || 'main' }}" >> $GITHUB_OUTPUT
          else
            echo "name=main" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository (target branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'artifacts/eq-partner-client/src-tauri -> target'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate app icons from tray-idle.png
        working-directory: artifacts/eq-partner-client
        run: pnpm tauri icon src-tauri/icons/tray-idle.png

      # Inject the Tauri signing public key into tauri.conf.json before building.
      # TAURI_SIGNING_PUBLIC_KEY must be set as a repository secret alongside
      # TAURI_SIGNING_PRIVATE_KEY. To generate a keypair run:
      #   pnpm tauri signer generate -w ~/.tauri/eq-partner.key
      # The command prints the public key — store it as TAURI_SIGNING_PUBLIC_KEY.
      - name: Inject updater public key into tauri.conf.json
        shell: pwsh
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          $confPath = "artifacts/eq-partner-client/src-tauri/tauri.conf.json"
          if ($env:TAURI_SIGNING_PUBLIC_KEY) {
            $conf = Get-Content $confPath -Raw
            $conf = $conf -replace 'REPLACE_WITH_TAURI_SIGNING_PUBLIC_KEY', $env:TAURI_SIGNING_PUBLIC_KEY
            Set-Content $confPath $conf -NoNewline
            Write-Host "Public key injected into tauri.conf.json."
          } else {
            Write-Host "::warning::TAURI_SIGNING_PUBLIC_KEY secret not set — updater signature verification will not work. See workflow comments for setup instructions."
          }

      # Inject the GitHub repo into the updater endpoint in tauri.conf.json.
      # This replaces the OWNER/REPO placeholder with the actual repository.
      - name: Inject GitHub repository into updater endpoint
        shell: pwsh
        run: |
          $confPath = "artifacts/eq-partner-client/src-tauri/tauri.conf.json"
          $repo = "${{ github.repository }}"
          $conf = Get-Content $confPath -Raw
          $conf = $conf -replace 'OWNER/REPO', $repo
          Set-Content $confPath $conf -NoNewline
          Write-Host "Updater endpoint set to: https://github.com/$repo/releases/latest/download/latest.json"

      - name: Build EQ Partner (NSIS installer + updater bundle)
        working-directory: artifacts/eq-partner-client
        run: pnpm tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Locate built artifacts
        id: find_artifacts
        shell: pwsh
        run: |
          $bundle = "artifacts/eq-partner-client/src-tauri/target/release/bundle/nsis"

          $exe = Get-ChildItem -Recurse $bundle -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No NSIS installer found under $bundle"; exit 1 }
          Write-Host "Found installer: $($exe.FullName)"
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

          $zip = Get-ChildItem -Recurse $bundle -Filter "*.nsis.zip" | Select-Object -First 1
          if ($zip) {
            Write-Host "Found updater zip: $($zip.FullName)"
            echo "zip_path=$($zip.FullName)" >> $env:GITHUB_OUTPUT
            echo "zip_name=$($zip.Name)" >> $env:GITHUB_OUTPUT

            $sig = Get-ChildItem -Recurse $bundle -Filter "*.nsis.zip.sig" | Select-Object -First 1
            if ($sig) {
              $sigContent = Get-Content $sig.FullName -Raw
              echo "zip_sig=$($sigContent.Trim())" >> $env:GITHUB_OUTPUT
              Write-Host "Found signature: $($sig.FullName)"
            } else {
              Write-Host "::warning::No .nsis.zip.sig found — updater bundles will not be signed."
            }
          } else {
            Write-Host "::warning::No .nsis.zip found — auto-updater bundle was not produced."
          }

      - name: Sign installer (Authenticode)
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $installerPath = "${{ steps.find_artifacts.outputs.exe_path }}"
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing.pfx"

          if ($env:WINDOWS_CERTIFICATE) {
            # Use the CA-issued or pre-generated certificate stored as a base64-encoded PFX secret.
            # To create: openssl pkcs12 -export -out signing.pfx -inkey key.pem -in cert.pem
            # Then: [Convert]::ToBase64String([IO.File]::ReadAllBytes("signing.pfx"))
            # Store the output as the WINDOWS_CERTIFICATE repository secret.
            Write-Host "Importing certificate from WINDOWS_CERTIFICATE secret..."
            $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            [IO.File]::WriteAllBytes($pfxPath, $certBytes)
            $pfxPassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          } else {
            # No certificate secret found — generate a self-signed certificate so the
            # installer at least shows "EQ Compendium" as publisher rather than
            # "Unknown Publisher".  Replace with a CA-issued cert to pass SmartScreen.
            Write-Host "WINDOWS_CERTIFICATE secret not set — generating a self-signed certificate..."
            $cert = New-SelfSignedCertificate `
              -Subject "CN=EQ Compendium, O=EQ Compendium, C=US" `
              -Type CodeSigning `
              -CertStoreLocation Cert:\CurrentUser\My `
              -HashAlgorithm SHA256 `
              -NotAfter (Get-Date).AddYears(3)
            $pfxPasswordPlain = [System.Guid]::NewGuid().ToString("N")
            $pfxPassword = ConvertTo-SecureString -String $pfxPasswordPlain -AsPlainText -Force
            Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pfxPassword | Out-Null
            Write-Host "Self-signed cert thumbprint: $($cert.Thumbprint)"
          }

          # Import PFX into the certificate store so signtool can locate it by thumbprint.
          $importedCert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pfxPassword
          $thumbprint = $importedCert.Thumbprint

          # Locate signtool from the Windows SDK (available on windows-latest runners).
          $signtool = Get-ChildItem -Recurse "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found — check Windows SDK installation." }
          Write-Host "Using signtool: $signtool"

          # Sign with SHA-256 digest + RFC 3161 timestamp so the signature remains
          # valid after the certificate expires.
          & $signtool sign `
            /sha1 $thumbprint `
            /fd SHA256 `
            /tr "http://timestamp.digicert.com" `
            /td SHA256 `
            /v `
            $installerPath

          if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }
          Write-Host "Installer signed successfully."

          # Clean up PFX from disk.
          Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue

      - name: Generate latest.json update manifest
        id: gen_manifest
        shell: pwsh
        run: |
          $isRelease = "${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true"
          $confPath = "artifacts/eq-partner-client/src-tauri/tauri.conf.json"
          $conf = Get-Content $confPath -Raw | ConvertFrom-Json
          $version = $conf.version
          $repo = "${{ github.repository }}"

          # Determine tag: use the pushed tag if available, otherwise construct from version.
          $tag = if ("${{ github.ref_name }}" -and "${{ github.ref_name }}" -ne "") {
            "${{ github.ref_name }}"
          } else {
            "eq-partner-v$version"
          }

          $zipName = "${{ steps.find_artifacts.outputs.zip_name }}"
          $sig     = "${{ steps.find_artifacts.outputs.zip_sig }}"

          if (-not $zipName -or -not $sig) {
            if ($isRelease) {
              Write-Error "Release build is missing the .nsis.zip and/or .nsis.zip.sig updater artifacts. Ensure TAURI_SIGNING_PRIVATE_KEY is set and the nsis bundle produced a signed zip."
              exit 1
            } else {
              Write-Host "::warning::Skipping latest.json — updater zip or signature not found (non-release build)."
              echo "manifest_generated=false" >> $env:GITHUB_OUTPUT
              exit 0
            }
          }

          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$zipName"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $manifest = [ordered]@{
            version  = $version
            notes    = "See the release page for details."
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $downloadUrl
              }
            }
          }

          $manifestPath = "artifacts/api-server/public/partner/latest.json"
          New-Item -ItemType Directory -Force (Split-Path $manifestPath) | Out-Null
          $manifest | ConvertTo-Json -Depth 5 | Set-Content $manifestPath -Encoding UTF8
          Write-Host "Generated $manifestPath"
          Write-Host ($manifest | ConvertTo-Json -Depth 5)
          echo "manifest_generated=true" >> $env:GITHUB_OUTPUT
          echo "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT

      - name: Copy installer to public directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "artifacts/api-server/public/partner" | Out-Null
          Copy-Item "${{ steps.find_artifacts.outputs.exe_path }}" "artifacts/api-server/public/partner/eq-partner.exe" -Force
          $size = (Get-Item "artifacts/api-server/public/partner/eq-partner.exe").Length
          Write-Host "Installer placed at artifacts/api-server/public/partner/eq-partner.exe ($size bytes)"

      - name: Commit installer and update manifest back to branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/api-server/public/partner/eq-partner.exe
          git add artifacts/api-server/public/partner/latest.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit — installer is already up to date."
          else
            git commit -m "chore: update eq-partner installer and update manifest [skip ci]"
            git push origin HEAD:${{ steps.branch.outputs.name }}
          fi

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: eq-partner-installer
          path: artifacts/api-server/public/partner/eq-partner.exe
          retention-days: 90

      - name: Upload updater bundle as workflow artifact
        if: steps.find_artifacts.outputs.zip_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: eq-partner-updater-bundle
          path: |
            ${{ steps.find_artifacts.outputs.zip_path }}
            ${{ steps.find_artifacts.outputs.zip_path }}.sig
          retention-days: 90

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: EQ Partner ${{ github.ref_name }}
          body: |
            EQ Partner desktop client installer for Windows.

            **Setup:**
            1. Download and run `eq-partner.exe`
            2. Open Settings from the system tray icon
            3. Enter your API key and EQ log file path
            4. Click **Start Watching**

            **Auto-update:** The app checks for updates on launch and notifies you when a new version is available.
          files: |
            artifacts/api-server/public/partner/eq-partner.exe
            ${{ steps.find_artifacts.outputs.zip_path }}
            ${{ steps.find_artifacts.outputs.zip_path }}.sig
            artifacts/api-server/public/partner/latest.json
